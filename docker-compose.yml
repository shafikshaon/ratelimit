services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: ratelimit
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 10

  app:
    build: .
    ports:
      - "8080:8080"
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: postgres
      DB_PASSWORD: postgres
      DB_NAME: ratelimit
      DB_SSLMODE: disable
      SERVER_PORT: 8080
    volumes:
      - .:/app
      - go_modules:/root/go/pkg/mod
      - go_cache:/root/.cache/go-build
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres_data:
  go_modules:
  go_cache:
