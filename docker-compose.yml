services:
  postgres:
    image: postgres:18-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: ratelimit
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  scylla:
    image: scylladb/scylla:6.2
    command: --developer-mode=1 --overprovisioned=1 --smp=1
    ports:
      - "9042:9042"
    volumes:
      - scylla_data:/var/lib/scylla
    healthcheck:
      test: ["CMD-SHELL", "nodetool status | grep -q UN"]
      interval: 15s
      timeout: 10s
      retries: 20
      start_period: 90s

  # ── Viewers ──────────────────────────────────────────────────────────────────

  # PostgreSQL: http://localhost:8082  (System: PostgreSQL, Server: postgres)
  adminer:
    image: adminer:4
    restart: unless-stopped
    ports:
      - "8082:8080"
    environment:
      ADMINER_DEFAULT_SERVER: postgres
    depends_on:
      postgres:
        condition: service_healthy

  # Redis: http://localhost:5540
  redisinsight:
    image: redis/redisinsight:latest
    restart: unless-stopped
    ports:
      - "5540:5540"
    depends_on:
      redis:
        condition: service_healthy

  # ScyllaDB: http://localhost:3000  (Host: scylla, Port: 9042)
  cassandra-web:
    image: ipushc/cassandra-web
    restart: unless-stopped
    hostname: cassandra-web
    ports:
      - "3000:3000"
    environment:
      HOST_PORT: ":3000"
      CASSANDRA_HOST: scylla
      CASSANDRA_PORT: "9042"
    depends_on:
      scylla:
        condition: service_healthy

  app:
    build: .
    ports:
      - "8080:8080"
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: postgres
      DB_PASSWORD: postgres
      DB_NAME: ratelimit
      DB_SSLMODE: disable
      REDIS_ADDR: redis:6379
      SCYLLA_HOSTS: scylla
      SCYLLA_KEYSPACE: ratelimit
      SERVER_PORT: 8080
      LOG_LEVEL: debug
      LOG_FILE: /app/logs/app.log
    volumes:
      - .:/app
      - go_modules:/root/go/pkg/mod
      - go_cache:/root/.cache/go-build
      - ./logs:/app/logs
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      scylla:
        condition: service_healthy

volumes:
  postgres_data:
  redis_data:
  scylla_data:
  go_modules:
  go_cache:
