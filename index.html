<!-- ═══════════════════════════════════
     PAGE WRAPPER
═══════════════════════════════════ -->
<div class="h-screen flex flex-col">

  <!-- ── SPLIT HEADER ── -->
  <header class="flex flex-shrink-0 h-12 border-b border-stone-200">

          class="inline-flex items-center gap-1.5 px-3 py-1.5 text-xs font-medium text-stone-600 border border-stone-200 hover:border-stone-300 hover:bg-stone-50 rounded-md transition-colors">
          <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M18 13v6a2 2 0 01-2 2H5a2 2 0 01-2-2V8a2 2 0 012-2h6"/><polyline points="15,3 21,3 21,9"/><line x1="10" y1="14" x2="21" y2="3"/></svg>

  <!-- ── BODY ── -->

            <input id="api-search" type="text" placeholder="Search APIs"
              class="w-full pl-8 pr-3 py-1.5 text-xs bg-stone-50 border border-stone-200 text-stone-700 rounded-md focus:outline-none focus:border-amber-400 placeholder-stone-400" />
          </div>

        <!-- API list -->
        <div id="api-list" class="flex-1 overflow-y-auto pb-3 mt-1"></div>

        <!-- Footer -->
        <div class="px-4 py-2.5 border-t border-stone-100 flex-shrink-0">
          <p id="footer-saved" class="text-[10px] text-stone-400 hidden">
            <span class="text-emerald-500 font-medium">Saved</span>
          </p>
          <p class="text-[10px] text-stone-400">Redis + ScyllaDB</p>
        </div>
      </aside>
    </div>

    <!-- Overlay (mobile) -->
    <div id="api-overlay" class="fixed inset-0 bg-black/50 z-20 hidden md:hidden"></div>

    <!-- ── MAIN CONTENT ── -->
    <main id="main-content" class="flex-1 overflow-y-auto min-w-0">
      <div class="max-w-5xl mx-auto space-y-4">
        <!-- populated by JS -->
      </div>
    </main>

  </div>

</div><!-- /page wrapper -->


<script>
// ═══════════════════════════════════════════════
//  API BASE
// ═══════════════════════════════════════════════
const API_BASE = '/api/v1';

// ═══════════════════════════════════════════════
//  USAGE STORE
// ═══════════════════════════════════════════════
// Usage is tracked in Redis via the backend.

// formatResetIn converts reset_in seconds into a human-readable label.
function formatResetIn(resetIn) {
  if (!resetIn || resetIn < 0) return null;
  const h = Math.floor(resetIn / 3600);
  const m = Math.floor((resetIn % 3600) / 60);
  const s = resetIn % 60;
  if (h > 0) return `resets in ${h}h ${m}m`;
  if (m > 0) return `resets in ${m}m ${s}s`;
  return `resets in ${s}s`;
}

// BDT_OFFSET_MS: Asia/Dhaka is UTC+6
const BDT_OFFSET_MS = 6 * 3600 * 1000;

function nowInBDT() {
  return new Date(Date.now() + BDT_OFFSET_MS - new Date().getTimezoneOffset() * 60000);
}

// ═══════════════════════════════════════════════
//  STATE
// ═══════════════════════════════════════════════
let apiGroups       = [];   // [{name, count, apis:[{id,name,group}]}]
let tierCache       = {};   // { apiName: [tier,...] }  — cached after first fetch
let resolvedCache   = {};   // { "apiName|wallet": ResolvedConfig } — MGET result cache
let selectedApiName = null;
const patchTimers   = {};

// ═══════════════════════════════════════════════
//  API CALLS
// ═══════════════════════════════════════════════

// Fetch grouped API list (no tiers, no overrides)
async function fetchAPIList() {
  const res = await fetch(`${API_BASE}/apis`);
  if (!res.ok) throw new Error('Failed to load API list');
  const json = await res.json();
  apiGroups = json.data || [];
  if (!selectedApiName && apiGroups.length && apiGroups[0].apis.length) {
    selectedApiName = apiGroups[0].apis[0].name;
  }
}

// Fetch tier config for one API (cached in tierCache)
async function fetchTiers(apiName) {
  if (tierCache[apiName]) return tierCache[apiName];
  const res = await fetch(`${API_BASE}/apis/${encodeURIComponent(apiName)}`);
  if (!res.ok) throw new Error('Failed to load API config');
  const json = await res.json();
  tierCache[apiName] = json.data.tiers || [];
  return tierCache[apiName];
}

// Debounced PATCH — writes to PostgreSQL and invalidates Redis cache server-side
function schedulePatch(apiName, tierNum) {
  const key = `${apiName}:${tierNum}`;
  clearTimeout(patchTimers[key]);
  patchTimers[key] = setTimeout(async () => {
    const tier = (tierCache[apiName] || []).find(t => t.tier === tierNum);
    if (!tier) return;
    try {
      const res = await fetch(`${API_BASE}/apis/${encodeURIComponent(apiName)}/tiers/${tierNum}`, {
        method: 'PATCH',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(tier),
      });
      if (!res.ok) throw new Error();
      // Invalidate local cache so next click re-fetches fresh data
      delete tierCache[apiName];
      showToast('Saved', 'ok');
    } catch {
      showToast('Failed to save tier', 'error');
    }
  }, 600);
}

async function apiAddOverride(apiName, override) {
  const res = await fetch(`${API_BASE}/apis/${encodeURIComponent(apiName)}/overrides`, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify(override),
  });
  if (!res.ok) {
    const err = await res.json().catch(() => ({}));
    throw new Error(err.error || 'Failed to add override');
  }
}

async function apiDeleteOverride(apiName, wallet) {
  const res = await fetch(
    `${API_BASE}/apis/${encodeURIComponent(apiName)}/overrides/${encodeURIComponent(wallet)}`,
    { method: 'DELETE' }
  );
  if (!res.ok) throw new Error('Failed to remove override');
}

async function fetchOverridePage(apiName, pageToken, limit = 20) {
  let url = `${API_BASE}/apis/${encodeURIComponent(apiName)}/overrides?limit=${limit}`;
  if (pageToken) url += `&page_token=${encodeURIComponent(pageToken)}`;
  const res = await fetch(url);
  if (!res.ok) throw new Error('Failed to fetch overrides');
  return res.json(); // { data, next_page_token, has_more }
}

// Single Redis MGET round trip: returns ResolvedConfig with effective_max per tier.
// Results are cached in resolvedCache for the duration of the page.
async function fetchWalletConfig(apiName, wallet) {
  const cacheKey = `${apiName}|${wallet}`;
  if (resolvedCache[cacheKey]) return resolvedCache[cacheKey];
  const res = await fetch(`${API_BASE}/apis/${encodeURIComponent(apiName)}/config/${encodeURIComponent(wallet)}`);
  if (!res.ok) throw new Error('Failed to fetch wallet config');
  const data = await res.json(); // ResolvedConfig
  resolvedCache[cacheKey] = data;
  return data;
}

// Invalidate resolved config cache for a wallet (call after override create/delete)
function invalidateWalletConfig(apiName, wallet) {
  delete resolvedCache[`${apiName}|${wallet}`];
}

// ═══════════════════════════════════════════════
//  BADGE HELPERS
// ═══════════════════════════════════════════════
const TIER_BADGE  = ['bg-blue-100 text-blue-800', 'bg-amber-100 text-amber-800', 'bg-emerald-100 text-emerald-800'];
const SCOPE_BADGE = { email: 'bg-pink-100 text-pink-700', wallet: 'bg-amber-100 text-amber-700' };

// ═══════════════════════════════════════════════
//  TOAST
// ═══════════════════════════════════════════════
let toastTimer;
function showToast(msg, type) {
  const $t = $('#toast');
  const isOk = type !== 'error';
  $t.removeClass().addClass(
    `fixed bottom-6 left-1/2 -translate-x-1/2 z-50 px-4 py-2.5 rounded-xl text-xs font-semibold
     flex items-center gap-2 shadow-lg transition-opacity duration-300
     ${isOk ? 'bg-stone-900 text-white' : 'bg-red-500 text-white'}`
  );
  $t.html(`
    <svg class="w-3.5 h-3.5 flex-shrink-0" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24">
      ${isOk ? '<path d="M20 6L9 17l-5-5"/>' : '<path d="M18 6L6 18M6 6l12 12"/>'}
    </svg>
    <span>${msg}</span>`);
  $t.css('opacity', 1).css('pointer-events', 'auto');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => $t.css('opacity', 0).css('pointer-events', 'none'), 2500);
}

// ═══════════════════════════════════════════════
//  RENDER SIDEBAR
// ═══════════════════════════════════════════════
function renderSidebar(filter) {
  filter = (filter || '').toLowerCase();
  const $list = $('#api-list').empty();

  for (const group of apiGroups) {
    const filtered = filter
      ? group.apis.filter(a => a.name.toLowerCase().includes(filter))
      : [...group.apis];
    if (!filtered.length) continue;

    const $group = $('<div>');
    $('<p>').addClass('px-4 pt-3 pb-1 text-[9px] font-bold uppercase tracking-widest text-stone-400')
      .text(`${group.name} (${filtered.length})`).appendTo($group);

    filtered.forEach(item => {
      const isActive = selectedApiName === item.name;

      const $item = $('<div>')
        .addClass(`api-item flex items-center gap-2 mx-2 px-2.5 py-1.5 rounded-md cursor-pointer ${isActive ? 'bg-amber-50' : 'hover:bg-stone-50'}`)
        .data('name', item.name);

      $('<div>').addClass(`w-1 h-1 rounded-full flex-shrink-0 ${isActive ? 'bg-amber-500' : 'bg-stone-300'}`).appendTo($item);
      $('<span>').addClass(`text-xs truncate ${isActive ? 'font-semibold text-amber-700' : 'text-stone-600'}`).text(item.name).appendTo($item);

      $item.on('click', async function() {
        selectedApiName = $(this).data('name');
        renderSidebar($('#api-search').val());
        await renderMain();
        if (window.innerWidth < 768) closeApiPanel();
      });

      $group.append($item);
    });

    $list.append($group);
  }
}

// ═══════════════════════════════════════════════
//  RENDER MAIN
// ═══════════════════════════════════════════════
async function renderMain() {
  const $wrap = $('#main-content .max-w-5xl').empty();

  if (!selectedApiName) {
    $wrap.append(`
      <div class="flex flex-col items-center justify-center py-24 text-center">
        <div class="w-12 h-12 bg-white rounded-xl flex items-center justify-center mb-4 border border-stone-200">
          <svg class="w-5 h-5 text-stone-300" fill="none" stroke="currentColor" stroke-width="1.8" viewBox="0 0 24 24"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>
        </div>
        <p class="text-sm font-semibold text-stone-500">Select an API to configure</p>
        <p class="text-xs text-stone-400 mt-1">Choose from the panel on the left</p>
      </div>`);
    return;
  }

  // Show loading skeleton while fetching tiers
  if (!tierCache[selectedApiName]) {
    $wrap.append(`<div class="flex items-center justify-center py-24 text-stone-400 text-sm gap-2">
      <svg class="w-4 h-4 animate-spin" fill="none" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"/><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8v8z"/></svg>
      Loading config…
    </div>`);
    try {
      await fetchTiers(selectedApiName);
    } catch(e) {
      $wrap.empty().append(`<div class="text-center py-24 text-red-400 text-sm">Failed to load config</div>`);
      return;
    }
    $wrap.empty();
  }

  const tiers = tierCache[selectedApiName] || [];

  // ── Title card ──
  const redisKeys = tiers.map(t =>
    `<span class="inline-block font-mono text-[10px] text-stone-500 bg-stone-100 border border-stone-200 rounded px-2 py-0.5">${t.redis_key}</span>`
  ).join('');
  $wrap.append(`
    <div class="bg-white border border-stone-200 rounded-xl px-4 py-3">
      <div class="flex items-center gap-3 mb-2">
        <h2 class="font-bold text-base text-stone-900">${selectedApiName}</h2>
      </div>
      <div class="flex flex-wrap gap-1.5">${redisKeys}</div>
    </div>`);

  // ── Tier cards ──
  const $grid = $('<div>').addClass('grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-3');
  tiers.forEach((t, i) => $grid.append(buildTierCard(t, i)));
  $wrap.append($grid);

  // ── Live Usage card ──
  const $usageCard = buildUsageCard(selectedApiName, tiers);
  $wrap.append($usageCard);
  $usageCard.find('#preview-email, #preview-wallet').on('input', () => refreshUsageOnCards(selectedApiName));

  // ── Overrides ──
  $wrap.append(buildOverridesCard(selectedApiName));
}

// ═══════════════════════════════════════════════
//  TIER CARD
// ═══════════════════════════════════════════════
function buildTierCard(t, idx) {
  const isDaily = t.unit === 'daily';

  const windowField = isDaily ? `
    <div class="space-y-1">
      <label class="text-[10px] font-semibold text-stone-400 uppercase tracking-wide">Reset hour (0-23)</label>
      <input data-field="reset_hour" type="number" min="0" max="23" value="${t.reset_hour ?? 0}"
        class="tier-input w-full px-2.5 py-1.5 text-xs font-semibold border border-stone-200 rounded-md bg-white" />
    </div>
    <div class="space-y-1">
      <label class="text-[10px] font-semibold text-stone-400 uppercase tracking-wide">Window</label>
      <div class="relative">
        <select data-field="window_daily"
          class="tier-input w-full px-2.5 py-1.5 text-xs font-semibold border border-stone-200 rounded-md bg-white appearance-none pr-7">
          <option selected>24h fixed daily</option>
          <option>12h fixed</option>
        </select>
        <svg class="absolute right-2.5 top-1/2 -translate-y-1/2 w-3 h-3 text-stone-400 pointer-events-none" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><polyline points="6,9 12,15 18,9"/></svg>
      </div>
    </div>` : `
    <div class="space-y-1">
      <label class="text-[10px] font-semibold text-stone-400 uppercase tracking-wide">Window</label>
      <input data-field="window" type="number" min="1" value="${t.window ?? 10}"
        class="tier-input w-full px-2.5 py-1.5 text-xs font-semibold border border-stone-200 rounded-md bg-white" />
    </div>
    <div class="space-y-1">
      <label class="text-[10px] font-semibold text-stone-400 uppercase tracking-wide">Unit</label>
      <div class="relative">
        <select data-field="unit"
          class="tier-input w-full px-2.5 py-1.5 text-xs font-semibold border border-stone-200 rounded-md bg-white appearance-none pr-7">
          ${['seconds','minutes','hours'].map(u => `<option ${u===t.unit?'selected':''}>${u}</option>`).join('')}
        </select>
        <svg class="absolute right-2.5 top-1/2 -translate-y-1/2 w-3 h-3 text-stone-400 pointer-events-none" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><polyline points="6,9 12,15 18,9"/></svg>
      </div>
    </div>`;

  const $card = $(`
    <div class="bg-white border border-stone-200 rounded-xl p-4 flex flex-col gap-3">
      <!-- Tier header -->
      <div class="flex items-center gap-2">
        <span class="text-[10px] font-bold px-2 py-0.5 rounded ${TIER_BADGE[idx]}">Tier ${t.tier}</span>
        <span class="text-[10px] font-semibold px-2 py-0.5 rounded ${SCOPE_BADGE[t.scope]||'bg-stone-100 text-stone-600'}">${t.scope}</span>
      </div>
      <!-- Redis key -->
      <div class="font-mono text-[9.5px] text-stone-400 bg-stone-50 border border-stone-100 rounded-md px-2.5 py-1.5 break-all leading-relaxed">${t.redis_key}</div>
      ${windowField}
      <div class="space-y-1">
        <label class="text-[10px] font-semibold text-stone-400 uppercase tracking-wide">Max requests</label>
        <input data-field="max_requests" type="number" min="1" value="${t.max_requests}"
          class="tier-input w-full px-2.5 py-1.5 text-xs font-semibold border border-stone-200 rounded-md bg-white" />
      </div>
    </div>`);

  function tierRef() { return tierCache[selectedApiName][idx]; }

  $card.find('[data-field="window"]').on('input', function() {
    tierRef().window = Math.max(1, parseInt($(this).val()) || 1);
    schedulePatch(selectedApiName, t.tier);
  });
  $card.find('[data-field="unit"]').on('change', function() {
    tierRef().unit = $(this).val();
    schedulePatch(selectedApiName, t.tier);
  });
  $card.find('[data-field="reset_hour"]').on('input', function() {
    tierRef().reset_hour = Math.min(23, Math.max(0, parseInt($(this).val()) || 0));
    schedulePatch(selectedApiName, t.tier);
  });
  $card.find('[data-field="max_requests"]').on('input', function() {
    tierRef().max_requests = Math.max(1, parseInt($(this).val()) || 1);
    schedulePatch(selectedApiName, t.tier);
  });

  return $card;
}

// ═══════════════════════════════════════════════
//  USAGE CARD (standalone)
// ═══════════════════════════════════════════════
function buildUsageCard(apiName, tiers) {
  const TIER_BADGE  = ['bg-blue-100 text-blue-700', 'bg-amber-100 text-amber-700', 'bg-emerald-100 text-emerald-700'];
  const SCOPE_BADGE = { email: 'bg-pink-100 text-pink-700', wallet: 'bg-amber-100 text-amber-700' };

  const rows = tiers.map((t, i) => `
    <div class="flex flex-col gap-1.5 py-3 ${i < tiers.length - 1 ? 'border-b border-stone-100' : ''}" data-usage-idx="${i}">
      <div class="flex items-center gap-1.5 flex-wrap">
        <span class="text-[10px] font-bold px-2 py-0.5 rounded ${TIER_BADGE[i] || 'bg-stone-100 text-stone-600'}">Tier ${t.tier}</span>
        <span class="text-[10px] font-semibold px-2 py-0.5 rounded ${SCOPE_BADGE[t.scope] || 'bg-stone-100 text-stone-600'}">${t.scope}</span>
        <span class="font-mono text-[9px] text-stone-400 bg-stone-50 border border-stone-100 rounded px-1.5 py-0.5 ml-auto truncate max-w-[260px]">${t.redis_key}</span>
      </div>
      <div class="w-full bg-stone-100 rounded-full h-1.5">
        <div class="h-1.5 rounded-full transition-all duration-500 bg-stone-200" id="ubar-${i}" style="width:0%"></div>
      </div>
      <p class="text-[10px] text-stone-400" id="utxt-${i}">${t.scope === 'email' ? 'Enter email above to see usage' : 'Enter wallet above to see usage'}</p>
    </div>`).join('');

  return $(`
    <div class="bg-white border border-stone-200 rounded-xl p-4">
      <!-- Header -->

// ═══════════════════════════════════════════════
//  REFRESH USAGE ON TIER CARDS
// ═══════════════════════════════════════════════
let usageRefreshTimer = null;

async function refreshUsageOnCards(apiName) {
  if (!apiName || !tierCache[apiName]) return;
  const email  = $('#preview-email').val().trim();
  const wallet = $('#preview-wallet').val().trim();
  if (!email && !wallet) {
    $('[data-usage-idx]').each(function(i) {
      $(`#ubar-${i}`).css('width','0%').removeClass('bg-emerald-400 bg-amber-400 bg-red-400').addClass('bg-stone-200');
      $(`#utxt-${i}`).text('Enter wallet/email above to see usage');
    });
    return;
  }

  try {
    const params = new URLSearchParams();
    if (email)  params.set('email',  email);
    if (wallet) params.set('wallet', wallet);
    const resp = await fetch(`${API_BASE}/apis/${encodeURIComponent(apiName)}/usage?${params}`);
    if (!resp.ok) return;
    const { data } = await resp.json();

    data.forEach((u, i) => {
      if (!u.scope_id) {
        $(`#ubar-${i}`).css('width','0%').removeClass('bg-emerald-400 bg-amber-400 bg-red-400').addClass('bg-stone-200');
        $(`#utxt-${i}`).text(u.scope === 'email' ? 'Enter email above' : 'Enter wallet above');
        return;
      }
      const pct = u.limit > 0 ? Math.min(100, Math.round(u.used / u.limit * 100)) : 0;
      const barColor = pct >= 100 ? 'bg-red-400' : pct >= 75 ? 'bg-amber-400' : 'bg-emerald-400';
      $(`#ubar-${i}`).css('width', `${pct}%`).removeClass('bg-stone-200 bg-emerald-400 bg-amber-400 bg-red-400').addClass(barColor);
      const resetLabel = formatResetIn(u.reset_in);
      $(`#utxt-${i}`).html(
        `<span class="font-semibold text-stone-600">${u.used}</span> / ${u.limit} requests &nbsp;·&nbsp; ${resetLabel || u.window}` +
        (pct >= 100 ? ' &nbsp;<span class="text-red-500 font-semibold">LIMIT REACHED</span>' : '')
      );
    });
    $('#usage-updated').removeClass('hidden').text(`Updated ${new Date().toLocaleTimeString()}`);
  } catch(e) { /* best-effort */ }
}

// ═══════════════════════════════════════════════
function buildOverridesCard(apiName) {
  // Pagination state scoped to this card instance
  let overrides    = [];
  let nextToken    = null;
  let hasMore      = false;
  let loadingMore  = false;

  const $card = $(`

        </div>

      </div>

      <!-- ── Wallet State Lookup ── -->

          <span class="text-[10px] font-bold text-stone-500 uppercase tracking-wide">Lookup wallet state</span>
          <div class="flex items-center gap-1.5 flex-1 max-w-xs justify-end">
            <div class="relative flex-1 max-w-[200px]">
              <svg class="absolute left-2.5 top-1/2 -translate-y-1/2 w-3 h-3 text-stone-400 pointer-events-none"
                fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                <circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/>
              </svg>
              <input id="lookup-wallet" type="text" placeholder="Wallet number"
                class="w-full pl-7 pr-2 py-1.5 text-xs border border-stone-200 rounded-md bg-white
                       focus:outline-none focus:ring-2 focus:ring-amber-400 placeholder-stone-400 font-mono" />
            </div>
            <button id="lookup-btn"
              class="px-2.5 py-1.5 text-xs font-semibold text-white bg-stone-700 hover:bg-stone-800 rounded-md transition-colors flex-shrink-0">
              Search
            </button>
            <button id="lookup-clear" class="hidden text-stone-400 hover:text-stone-600 p-1 rounded transition-colors flex-shrink-0">
              <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M18 6L6 18M6 6l12 12"/></svg>
            </button>
          </div>
        </div>
        <div id="lookup-result" class="hidden px-3 py-3"></div>
      </div>

      <!-- ── Add Override Form ── -->
      <div>
        <p class="text-[10px] font-bold text-stone-400 uppercase tracking-wide mb-2">Add override</p>
        <div class="flex flex-wrap gap-2 items-end">
          <div class="flex-1 min-w-[120px] space-y-1">
            <label class="text-[10px] font-semibold text-stone-400">Wallet</label>
            <input id="ov-wallet" type="text" placeholder="01700000099"
              class="w-full px-2.5 py-1.5 text-xs border border-stone-200 rounded-md focus:outline-none focus:ring-2 focus:ring-amber-400 bg-white font-mono" />
          </div>
          <div class="flex-1 min-w-[80px] space-y-1">
            <label class="text-[10px] font-semibold text-stone-400">T1 limit</label>
            <input id="ov-t1" type="text" placeholder="global"
              class="w-full px-2.5 py-1.5 text-xs border border-stone-200 rounded-md focus:outline-none focus:ring-2 focus:ring-amber-400 bg-white" />
          </div>
          <div class="flex-1 min-w-[80px] space-y-1">
            <label class="text-[10px] font-semibold text-stone-400">T2 limit</label>
            <input id="ov-t2" type="text" placeholder="global"
              class="w-full px-2.5 py-1.5 text-xs border border-stone-200 rounded-md focus:outline-none focus:ring-2 focus:ring-amber-400 bg-white" />
          </div>
          <div class="flex-1 min-w-[80px] space-y-1">
            <label class="text-[10px] font-semibold text-stone-400">T3 limit</label>
            <input id="ov-t3" type="text" placeholder="global"
              class="w-full px-2.5 py-1.5 text-xs border border-stone-200 rounded-md focus:outline-none focus:ring-2 focus:ring-amber-400 bg-white" />
          </div>
          <div class="flex-1 min-w-[90px] space-y-1">
            <label class="text-[10px] font-semibold text-stone-400">Reason</label>
            <input id="ov-reason" type="text" placeholder="note"
              class="w-full px-2.5 py-1.5 text-xs border border-stone-200 rounded-md focus:outline-none focus:ring-2 focus:ring-amber-400 bg-white" />
          </div>
          <button id="ov-add"
            class="px-3 py-1.5 text-xs font-semibold text-white bg-amber-500 hover:bg-amber-600 rounded-md transition-colors flex-shrink-0 self-end">
            Add
          </button>
        </div>
      </div>

      <!-- ── Override Table ── -->
      <div class="overflow-x-auto rounded-lg border border-stone-100">
        <table class="w-full text-xs min-w-[520px]">
          <thead>
            <tr class="bg-stone-50 border-b border-stone-100">
              <th class="text-left px-3 py-2 text-[10px] font-bold text-stone-400 uppercase tracking-wide">Wallet</th>
              <th class="text-left px-3 py-2 text-[10px] font-bold text-stone-400 uppercase tracking-wide">T1</th>
              <th class="text-left px-3 py-2 text-[10px] font-bold text-stone-400 uppercase tracking-wide">T2</th>
              <th class="text-left px-3 py-2 text-[10px] font-bold text-stone-400 uppercase tracking-wide">T3</th>
              <th class="text-left px-3 py-2 text-[10px] font-bold text-stone-400 uppercase tracking-wide">Reason</th>
              <th class="px-3 py-2"></th>
            </tr>
          </thead>
          <tbody id="ov-tbody"></tbody>
        </table>
      </div>
      <!-- Load more -->
      <div id="ov-load-more" class="hidden flex justify-center">
        <button id="ov-load-more-btn"
          class="px-3 py-1.5 text-xs font-semibold text-stone-500 border border-stone-200 hover:bg-stone-50 rounded-md transition-colors">
          Load more
        </button>
      </div>
    </div>`);

  function refreshTable() {
    const $tbody = $card.find('#ov-tbody').empty();
    if (!overrides.length) {
      $('<tr>').append(
        $('<td colspan="6" class="py-8 text-center text-stone-400 text-xs">').text('No wallet overrides for this API')
      ).appendTo($tbody);
    } else {
      overrides.forEach((r, i) => {
        const $del = $('<button>')
          .addClass('text-stone-300 hover:text-red-500 transition-colors p-1 rounded')
          .html(`<svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M3 6h18M8 6V4h8v2M19 6l-1 14H6L5 6"/></svg>`)
          .on('click', async function() {
            const deletedWallet = overrides[i].wallet;
            try {
              await apiDeleteOverride(apiName, deletedWallet);
              overrides.splice(i, 1);
              invalidateWalletConfig(apiName, deletedWallet);
              refreshTable();
              if ($card.find('#lookup-wallet').val().trim() === deletedWallet) doLookup();
              showToast('Override removed', 'ok');
            } catch(e) {
              showToast(e.message, 'error');
            }
          });

        const rowBg = i % 2 === 0 ? '' : 'bg-stone-50/60';
        $(`<tr class="border-t border-stone-100 hover:bg-amber-50/30 transition-colors ${rowBg}">`).append(
          $('<td class="px-3 py-2 font-mono text-stone-700">').text(r.wallet),
          $('<td class="px-3 py-2 text-stone-500">').text(r.t1),
          $('<td class="px-3 py-2 text-stone-500">').text(r.t2),
          $('<td class="px-3 py-2 text-stone-500">').text(r.t3),
          $('<td class="px-3 py-2 text-stone-400">').text(r.reason),
          $('<td class="px-2 py-2 text-right">').append($del)
        ).appendTo($tbody);
      });
    }

    // Show/hide load-more button
    if (hasMore) {
      $card.find('#ov-load-more').removeClass('hidden');
    } else {
      $card.find('#ov-load-more').addClass('hidden');
    }
  }

  async function loadMore() {
    if (loadingMore) return;
    loadingMore = true;
    const $btn = $card.find('#ov-load-more-btn').text('Loading…').prop('disabled', true);
    try {
      const page = await fetchOverridePage(apiName, nextToken);
      overrides.push(...(page.data || []));
      nextToken = page.next_page_token || null;
      hasMore   = page.has_more || false;
      refreshTable();
    } catch(e) {
      showToast('Failed to load overrides', 'error');
    } finally {
      loadingMore = false;
      $btn.text('Load more').prop('disabled', false);
    }
  }

  $card.find('#ov-load-more-btn').on('click', loadMore);

  // ── Wallet Lookup — backed by GET /api/v1/apis/:name/config/:wallet (single Redis MGET) ──
  async function doLookup() {
    const walletNum = $card.find('#lookup-wallet').val().trim();
    const $result   = $card.find('#lookup-result');

    if (!walletNum) {
      $card.find('#lookup-wallet').focus();
      return;
    }

    // Show loading state
    $result.empty().removeClass('hidden').html(
      `<div class="flex items-center gap-2 text-xs text-stone-400 py-1">
        <svg class="w-3.5 h-3.5 animate-spin" fill="none" viewBox="0 0 24 24">
          <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"/>
          <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8v8z"/>
        </svg>
        Looking up wallet…
      </div>`
    );
    $card.find('#lookup-clear').removeClass('hidden');

    let resolved;
    try {
      resolved = await fetchWalletConfig(apiName, walletNum);
    } catch(e) {
      $result.html(`<p class="text-xs text-red-400">Failed to fetch wallet config</p>`);
      return;
    }

    $result.empty();

    const hasOverride = resolved.tiers.some(rt => rt.overridden);

    // Fill key chips with resolved values
    const ov = overrides.find(r => r.wallet === walletNum);
    $card.find('.ov-kv-wallet').text(walletNum);
    $card.find('.ov-kv-t1').text(ov ? (ov.t1 || 'global') : '{t1}');
    $card.find('.ov-kv-t2').text(ov ? (ov.t2 || 'global') : '{t2}');
    $card.find('.ov-kv-t3').text(ov ? (ov.t3 || 'global') : '{t3}');
    $card.find('.ov-kv-reason').text(ov ? (ov.reason || '—') : '{reason}');
    const $header = $(`
      <div class="flex items-center gap-2 mb-3">
        <span class="font-mono text-xs font-semibold text-stone-700">${walletNum}</span>
        ${hasOverride
          ? '<span class="text-[10px] font-semibold px-2 py-0.5 rounded bg-amber-50 text-amber-600 ring-1 ring-amber-200">has override</span>'
          : '<span class="text-[10px] font-semibold px-2 py-0.5 rounded bg-stone-100 text-stone-500">using global defaults</span>'}
      </div>`);
    $result.append($header);

    const $grid = $('<div class="grid grid-cols-1 sm:grid-cols-3 gap-2">').appendTo($result);
    const TIER_COLORS = [
      { bg: 'bg-blue-50', border: 'border-blue-100', label: 'text-blue-700', badge: 'bg-blue-100 text-blue-800' },
      { bg: 'bg-amber-50', border: 'border-amber-100', label: 'text-amber-700', badge: 'bg-amber-100 text-amber-800' },
      { bg: 'bg-emerald-50', border: 'border-emerald-100', label: 'text-emerald-700', badge: 'bg-emerald-100 text-emerald-800' },
    ];

    resolved.tiers.forEach((rt, i) => {
      const c = TIER_COLORS[i] || TIER_COLORS[0];
      const isDaily = rt.unit === 'daily';
      const globalLabel = isDaily
        ? `${rt.global_max} / day (resets ${String(rt.reset_hour).padStart(2,'0')}:00 BDT)`
        : `${rt.global_max} / ${rt.window ?? '?'} ${rt.unit}`;
      const effectiveLabel = isDaily
        ? `${rt.effective_max} / day (resets ${String(rt.reset_hour).padStart(2,'0')}:00 BDT)`
        : `${rt.effective_max} / ${rt.window ?? '?'} ${rt.unit}`;

      $grid.append($(`
        <div class="rounded-lg border ${c.border} ${c.bg} p-3 space-y-2">
          <div class="flex items-center gap-1.5">
            <span class="text-[11px] font-semibold ${c.label}">Tier ${rt.tier}</span>
            <span class="text-[10px] px-1.5 py-0.5 rounded ${c.badge}">${rt.scope}</span>
          </div>
          <div>
            <p class="text-[10px] text-stone-400 mb-0.5">Effective limit</p>
            <p class="text-xs font-semibold text-stone-800 font-mono">${effectiveLabel}</p>
          </div>
          ${rt.overridden ? `
          <div>
            <p class="text-[10px] text-stone-400 mb-0.5">Global default</p>
            <p class="text-[10px] text-stone-500 font-mono line-through">${globalLabel}</p>
          </div>` : ''}
          <div class="pt-1 border-t ${c.border}">
            <span class="text-[10px] ${rt.overridden ? 'text-amber-600 font-semibold' : 'text-stone-400'}">
              ${rt.overridden ? '↑ overridden' : 'global default'}
            </span>
          </div>
        </div>`));
    });
  }

  $card.find('#lookup-btn').on('click', doLookup);
  $card.find('#lookup-wallet').on('keydown', function(e) {
    if (e.key === 'Enter') doLookup();
  });
  $card.find('#lookup-clear').on('click', function() {
    $card.find('#lookup-wallet').val('');
    $card.find('#lookup-result').addClass('hidden').empty();
    $(this).addClass('hidden');
    // Reset key chips to placeholders
    $card.find('.ov-kv-wallet').text('{wallet}');
    $card.find('.ov-kv-t1').text('{t1}');
    $card.find('.ov-kv-t2').text('{t2}');
    $card.find('.ov-kv-t3').text('{t3}');
    $card.find('.ov-kv-reason').text('{reason}');
  });

  $card.find('#ov-add').on('click', async function() {
    const wallet = $card.find('#ov-wallet').val().trim();
    if (!wallet) {
      $card.find('#ov-wallet').focus().addClass('ring-2 ring-red-400');
      setTimeout(() => $card.find('#ov-wallet').removeClass('ring-2 ring-red-400'), 1500);
      return;
    }
    const override = {
      wallet,
      t1: $card.find('#ov-t1').val().trim() || 'global',
      t2: $card.find('#ov-t2').val().trim() || 'global',
      t3: $card.find('#ov-t3').val().trim() || 'global',
      reason: $card.find('#ov-reason').val().trim() || '',
    };
    try {
      await apiAddOverride(apiName, override);
      invalidateWalletConfig(apiName, wallet);
      // Upsert in local list
      const idx = overrides.findIndex(r => r.wallet === wallet);
      if (idx >= 0) overrides[idx] = override; else overrides.unshift(override);
      $card.find('#ov-wallet,#ov-t1,#ov-t2,#ov-t3,#ov-reason').val('');
      refreshTable();
      if ($card.find('#lookup-wallet').val().trim() === wallet) doLookup();
      showToast('Override added', 'ok');
    } catch(e) {
      showToast(e.message, 'error');
    }
  });

  // Initial page load
  loadMore();

  return $card;
}

function openApiPanel() {
  $('#api-panel').removeClass('-translate-x-full').addClass('translate-x-0');
  $('#api-overlay').removeClass('hidden');
}
function closeApiPanel() {
  $('#api-panel').addClass('-translate-x-full').removeClass('translate-x-0');
  $('#api-overlay').addClass('hidden');
}

// ═══════════════════════════════════════════════
//  INIT
// ═══════════════════════════════════════════════
$(async function() {
  try {
    await fetchAPIList();
  } catch(e) {
    showToast('Could not connect to server', 'error');
  }

  renderSidebar();
  await renderMain();

  setInterval(() => refreshUsageOnCards(selectedApiName), 4000);

  $('#api-search').on('input', function() { renderSidebar($(this).val()); });

  $('#save-btn').on('click', function() {
    showToast('Changes are saved automatically', 'ok');
  });

  $('#api-panel-toggle').on('click', function() {
    if ($('#api-panel').hasClass('-translate-x-full')) openApiPanel(); else closeApiPanel();
  });
  $('#api-overlay').on('click', closeApiPanel);

  $(window).on('resize', function() {
    if (window.innerWidth >= 768) closeApiPanel();
  });
});
