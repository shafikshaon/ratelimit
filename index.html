<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>RateLimiter — Configuration</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; }

    :root {
      --bg:        #F1F5F9;
      --surface:   #FFFFFF;
      --surface2:  #F8FAFC;
      --border:    #E2E8F0;
      --border2:   #CBD5E1;
      --text:      #0F172A;
      --text2:     #334155;
      --text3:     #64748B;
      --text4:     #94A3B8;
      --accent:    #6366F1;
      --accent-h:  #4F46E5;
      --t1:        #3B82F6;
      --t2:        #8B5CF6;
      --t3:        #10B981;
    }

    body { font-family: 'Inter', system-ui, sans-serif; background: var(--bg); color: var(--text); }

    ::-webkit-scrollbar { width: 4px; height: 4px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 10px; }
    ::-webkit-scrollbar-thumb:hover { background: #94A3B8; }

    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
    }
    .card-hover:hover { border-color: #A5B4FC; transition: border-color .15s; }

    /* Sidebar API items */
    .api-item { border-radius: 7px; padding: 5px 9px; cursor: pointer; display: flex; align-items: center; gap: 8px; transition: background .1s; }
    .api-item:hover   { background: #F1F5F9; }
    .api-item.active  { background: #EEF2FF; }
    .api-item.active .api-label { color: #4F46E5; font-weight: 600; }
    .api-item.active .dot { background: #6366F1; }
    .api-item .dot { width: 5px; height: 5px; border-radius: 50%; background: #CBD5E1; flex-shrink: 0; }
    .api-label { font-size: 12px; color: var(--text3); overflow: hidden; white-space: nowrap; text-overflow: ellipsis; }

    /* Pill badges */
    .pill { display: inline-flex; align-items: center; font-size: 10px; font-weight: 600;
            padding: 2px 8px; border-radius: 20px; letter-spacing: .02em; }
    .pill-t1  { background: #DBEAFE; color: #1D4ED8; }
    .pill-t2  { background: #EDE9FE; color: #6D28D9; }
    .pill-t3  { background: #D1FAE5; color: #065F46; }
    .pill-em  { background: #FFE4E6; color: #BE123C; }
    .pill-wl  { background: #FEF3C7; color: #92400E; }

    /* Top border accent per tier card */
    .tier-t1 { border-top: 2px solid var(--t1); }
    .tier-t2 { border-top: 2px solid var(--t2); }
    .tier-t3 { border-top: 2px solid var(--t3); }

    /* Inputs */
    .f-input {
      width: 100%; padding: 7px 10px; font-size: 12.5px; font-weight: 500;
      background: var(--surface2); border: 1px solid var(--border); border-radius: 7px;
      color: var(--text); outline: none; transition: border-color .15s, box-shadow .15s;
    }
    .f-input:focus { border-color: #818CF8; box-shadow: 0 0 0 3px rgba(99,102,241,.12); background: #fff; }
    .f-input::placeholder { color: var(--text4); }
    select.f-input { appearance: none; cursor: pointer; }

    /* Field label */
    .flabel { font-size: 10px; font-weight: 700; letter-spacing: .07em; text-transform: uppercase; color: var(--text4); margin-bottom: 5px; }

    /* Buttons */
    .btn-primary {
      display: inline-flex; align-items: center; gap: 6px;
      padding: 7px 14px; font-size: 12px; font-weight: 600;
      background: var(--accent); color: #fff; border-radius: 8px; border: none; cursor: pointer;
      transition: background .15s, box-shadow .15s;
    }
    .btn-primary:hover { background: var(--accent-h); box-shadow: 0 4px 14px rgba(99,102,241,.35); }

    .btn-ghost {
      display: inline-flex; align-items: center; gap: 6px;
      padding: 7px 14px; font-size: 12px; font-weight: 500;
      background: transparent; color: var(--text3); border: 1px solid var(--border);
      border-radius: 8px; cursor: pointer; transition: background .15s, color .15s, border-color .15s;
    }
    .btn-ghost:hover { background: var(--surface2); color: var(--text2); border-color: var(--border2); }

    /* Usage bar */
    .ubar-wrap { background: #F1F5F9; border-radius: 99px; height: 5px; overflow: hidden; }
    .ubar { height: 100%; border-radius: 99px; transition: width .5s ease; background: #E2E8F0; }
    .ubar.low  { background: linear-gradient(90deg, #10B981, #34D399); }
    .ubar.mid  { background: linear-gradient(90deg, #F59E0B, #FBBF24); }
    .ubar.high { background: linear-gradient(90deg, #EF4444, #F87171); }

    /* Monospace */
    .mono { font-family: 'JetBrains Mono', monospace; }

    /* Override table */
    .ov-tr:hover td { background: #F8FAFF; }
    .ov-td { border-bottom: 1px solid var(--border); padding: 9px 12px; font-size: 12px; transition: background .1s; color: var(--text2); }

    /* Toast */
    #toast { font-family: 'Inter', sans-serif; }

    /* Divider */
    .sep { height: 1px; background: var(--border); }

    @keyframes spin { to { transform: rotate(360deg); } }

    /* Header gradient bar */
    .header-accent { background: linear-gradient(135deg, #6366F1, #8B5CF6); }
  </style>
</head>

<body class="h-screen overflow-hidden antialiased">

<!-- Toast -->
<div id="toast"
  class="fixed bottom-5 left-1/2 -translate-x-1/2 z-50 flex items-center gap-2.5
         px-4 py-2.5 rounded-xl text-xs font-semibold shadow-xl
         opacity-0 pointer-events-none transition-all duration-300"
  style="min-width:200px;">
</div>

<div class="h-screen flex flex-col">

  <!-- ── HEADER ── -->
  <header style="background:#fff; border-bottom:1px solid #E2E8F0; height:54px;"
          class="flex flex-shrink-0 items-center px-5 gap-4 shadow-sm">

    <div class="flex items-center gap-3">
      <div class="header-accent flex items-center justify-center flex-shrink-0"
           style="width:32px;height:32px;border-radius:9px;">
        <svg style="width:16px;height:16px;color:#fff;" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24">
          <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/>
        </svg>
      </div>
      <div>
        <div style="font-size:14px;font-weight:700;color:#0F172A;letter-spacing:-.02em;line-height:1.2;">RateLimiter</div>
        <div style="font-size:10px;color:#94A3B8;line-height:1;">Configuration</div>
      </div>
    </div>

    <div style="width:1px;height:26px;background:#E2E8F0;" class="mx-1"></div>

    <div class="flex-1 min-w-0 hidden sm:block">
      <span style="font-size:11.5px;color:#94A3B8;">Multi-tier rate limiting · Wallet &amp; Email scoped · Redis + ScyllaDB</span>
    </div>

    <div class="flex items-center gap-2">
      <button id="api-panel-toggle" class="md:hidden btn-ghost" style="padding:7px;">
        <svg style="width:16px;height:16px;" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
          <path d="M8 6h13M8 12h13M8 18h13"/>
        </svg>
      </button>
      <a href="tester.html" target="_blank" class="btn-ghost">
        <svg style="width:13px;height:13px;" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
          <polygon points="5,3 19,12 5,21"/>
        </svg>
        Tester
      </a>
      <button id="save-btn" class="btn-primary">
        <svg style="width:13px;height:13px;" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
          <path d="M19 21H5a2 2 0 01-2-2V5a2 2 0 012-2h11l5 5v14a2 2 0 01-2 2z"/>
          <polyline points="17,21 17,13 7,13 7,21"/><polyline points="7,3 7,8 15,8"/>
        </svg>
        Save
      </button>
    </div>
  </header>

  <!-- ── BODY ── -->
  <div class="flex flex-1 overflow-hidden min-h-0 p-3 gap-3">

    <!-- ── SIDEBAR ── -->
    <div class="fixed md:relative inset-y-3 left-3 z-30 w-56 flex-shrink-0
                -translate-x-[calc(100%+12px)] md:translate-x-0 flex flex-col"
         id="api-panel" style="transition:transform .25s cubic-bezier(.4,0,.2,1);">
      <aside class="flex-1 flex flex-col rounded-xl overflow-hidden"
             style="background:#fff;border:1px solid #E2E8F0;box-shadow:0 1px 3px rgba(0,0,0,.06);">

        <div style="padding:10px 10px 8px;">
          <div style="position:relative;">
            <svg style="position:absolute;left:9px;top:50%;transform:translateY(-50%);width:13px;height:13px;color:#CBD5E1;pointer-events:none;"
                 fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
              <circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/>
            </svg>
            <input id="api-search" type="text" placeholder="Search APIs…"
              class="f-input" style="padding-left:30px;font-size:12px;" />
          </div>
        </div>

        <div id="api-list" class="flex-1 overflow-y-auto pb-2" style="padding:0 6px;"></div>

        <div style="padding:10px 12px;border-top:1px solid #F1F5F9;">
          <div style="display:flex;align-items:center;gap:6px;">
            <span style="width:6px;height:6px;border-radius:50%;background:#10B981;flex-shrink:0;
                         box-shadow:0 0 0 2px rgba(16,185,129,.2);"></span>
            <span style="font-size:10px;color:#CBD5E1;">Redis · ScyllaDB · PostgreSQL</span>
          </div>
        </div>
      </aside>
    </div>

    <div id="api-overlay" class="fixed inset-0 z-20 hidden md:hidden" style="background:rgba(15,23,42,.4);"></div>

    <!-- ── MAIN ── -->
    <main id="main-content" class="flex-1 overflow-y-auto min-w-0">
      <div class="max-w-5xl mx-auto space-y-4"></div>
    </main>

  </div>
</div>


<script>
const API_BASE = '/api/v1';

function formatResetIn(s) {
  if (!s || s < 0) return null;
  const h = Math.floor(s/3600), m = Math.floor((s%3600)/60), ss = s%60;
  if (h) return `resets in ${h}h ${m}m`;
  if (m) return `resets in ${m}m ${ss}s`;
  return `resets in ${ss}s`;
}

let apiGroups = [], tierCache = {}, resolvedCache = {}, selectedApiName = null;
const patchTimers = {};

async function fetchAPIList() {
  const r = await fetch(`${API_BASE}/apis`);
  if (!r.ok) throw new Error();
  const j = await r.json();
  apiGroups = j.data || [];
  if (!selectedApiName && apiGroups.length && apiGroups[0].apis.length)
    selectedApiName = apiGroups[0].apis[0].name;
}

async function fetchTiers(name) {
  if (tierCache[name]) return tierCache[name];
  const r = await fetch(`${API_BASE}/apis/${encodeURIComponent(name)}`);
  if (!r.ok) throw new Error();
  const j = await r.json();
  tierCache[name] = j.data.tiers || [];
  return tierCache[name];
}

function schedulePatch(name, tierNum) {
  const k = `${name}:${tierNum}`;
  clearTimeout(patchTimers[k]);
  patchTimers[k] = setTimeout(async () => {
    const tier = (tierCache[name]||[]).find(t => t.tier === tierNum);
    if (!tier) return;
    try {
      const r = await fetch(`${API_BASE}/apis/${encodeURIComponent(name)}/tiers/${tierNum}`,
        { method:'PATCH', headers:{'Content-Type':'application/json'}, body:JSON.stringify(tier) });
      if (!r.ok) throw new Error();
      delete tierCache[name];
      showToast('Saved', 'ok');
    } catch { showToast('Failed to save tier', 'err'); }
  }, 600);
}

async function apiAddOverride(name, o) {
  const r = await fetch(`${API_BASE}/apis/${encodeURIComponent(name)}/overrides`,
    { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify(o) });
  if (!r.ok) { const e = await r.json().catch(()=>({})); throw new Error(e.error||'Failed'); }
}

async function apiDeleteOverride(name, wallet) {
  const r = await fetch(`${API_BASE}/apis/${encodeURIComponent(name)}/overrides/${encodeURIComponent(wallet)}`, { method:'DELETE' });
  if (!r.ok) throw new Error('Failed to remove override');
}

async function fetchOverridePage(name, token, limit=20) {
  let url = `${API_BASE}/apis/${encodeURIComponent(name)}/overrides?limit=${limit}`;
  if (token) url += `&page_token=${encodeURIComponent(token)}`;
  const r = await fetch(url);
  if (!r.ok) throw new Error();
  return r.json();
}

async function fetchWalletConfig(name, wallet) {
  const key = `${name}|${wallet}`;
  if (resolvedCache[key]) return resolvedCache[key];
  const r = await fetch(`${API_BASE}/apis/${encodeURIComponent(name)}/config/${encodeURIComponent(wallet)}`);
  if (!r.ok) throw new Error();
  resolvedCache[key] = await r.json();
  return resolvedCache[key];
}

function invalidateWalletConfig(name, wallet) { delete resolvedCache[`${name}|${wallet}`]; }

// ── TOAST ──
let _tt;
function showToast(msg, type) {
  const $t = $('#toast');
  const ok = type === 'ok';
  $t.attr('style', `min-width:200px;${ok
    ? 'background:#fff;border:1px solid #C7D7FE;color:#3730A3;box-shadow:0 4px 20px rgba(99,102,241,.15);'
    : 'background:#FFF1F2;border:1px solid #FECDD3;color:#BE123C;box-shadow:0 4px 20px rgba(239,68,68,.15);'}`);
  $t.html(`
    <svg style="width:14px;height:14px;flex-shrink:0;" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24">
      ${ok ? '<path d="M20 6L9 17l-5-5"/>' : '<path d="M18 6L6 18M6 6l12 12"/>'}
    </svg><span>${msg}</span>`);
  $t.css({ opacity:1, 'pointer-events':'auto' });
  clearTimeout(_tt);
  _tt = setTimeout(() => $t.css({ opacity:0, 'pointer-events':'none' }), 2500);
}

// ── SIDEBAR ──
function renderSidebar(filter) {
  filter = (filter||'').toLowerCase();
  const $list = $('#api-list').empty();
  for (const g of apiGroups) {
    const items = filter ? g.apis.filter(a => a.name.toLowerCase().includes(filter)) : [...g.apis];
    if (!items.length) continue;
    const $g = $('<div>');
    $('<div>').css({ padding:'10px 4px 4px', fontSize:'9px', fontWeight:'700',
                     letterSpacing:'.1em', textTransform:'uppercase', color:'#CBD5E1' })
              .text(g.name).appendTo($g);
    items.forEach(item => {
      const active = selectedApiName === item.name;
      const $item = $('<div>').addClass(`api-item${active?' active':''}`).data('name', item.name);
      $('<div>').addClass('dot').appendTo($item);
      $('<span>').addClass('api-label').text(item.name).appendTo($item);
      $item.on('click', async function() {
        selectedApiName = $(this).data('name');
        renderSidebar($('#api-search').val());
        await renderMain();
        if (window.innerWidth < 768) closeApiPanel();
      });
      $g.append($item);
    });
    $list.append($g);
  }
}

// ── MAIN ──
async function renderMain() {
  const $wrap = $('#main-content .max-w-5xl').empty();
  if (!selectedApiName) {
    $wrap.append(`<div style="display:flex;flex-direction:column;align-items:center;justify-content:center;padding:80px 0;text-align:center;">
      <div style="width:52px;height:52px;background:#EEF2FF;border:1px solid #C7D7FE;border-radius:14px;
                  display:flex;align-items:center;justify-content:center;margin-bottom:14px;">
        <svg style="width:22px;height:22px;color:#6366F1;" fill="none" stroke="currentColor" stroke-width="1.8" viewBox="0 0 24 24">
          <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/>
        </svg>
      </div>
      <p style="font-size:15px;font-weight:600;color:#0F172A;">Select an API to configure</p>
      <p style="font-size:12px;color:#94A3B8;margin-top:5px;">Choose from the panel on the left</p>
    </div>`);
    return;
  }

  if (!tierCache[selectedApiName]) {
    $wrap.append(`<div style="display:flex;align-items:center;justify-content:center;gap:8px;padding:80px 0;color:#94A3B8;font-size:13px;">
      <svg style="width:16px;height:16px;animation:spin 1s linear infinite;" fill="none" viewBox="0 0 24 24">
        <circle cx="12" cy="12" r="10" stroke="#E2E8F0" stroke-width="4"/>
        <path fill="#6366F1" d="M4 12a8 8 0 018-8v8z"/>
      </svg>Loading…</div>`);
    try { await fetchTiers(selectedApiName); }
    catch { $wrap.empty().append(`<div style="text-align:center;padding:80px 0;font-size:13px;color:#EF4444;">Failed to load config</div>`); return; }
    $wrap.empty();
  }

  const tiers = tierCache[selectedApiName] || [];
  const TOPS = ['tier-t1','tier-t2','tier-t3'];

  // Title card
  $wrap.append(`<div class="card" style="padding:16px 20px;">
    <div style="display:flex;align-items:center;gap:10px;margin-bottom:10px;">
      <div style="width:7px;height:7px;border-radius:50%;background:#6366F1;flex-shrink:0;"></div>
      <h2 style="font-size:16px;font-weight:700;color:#0F172A;letter-spacing:-.02em;">${selectedApiName}</h2>
    </div>
    <div style="display:flex;flex-wrap:wrap;gap:6px;">
      ${tiers.map(t => `<span class="mono" style="font-size:10px;color:#64748B;background:#F8FAFC;
        border:1px solid #E2E8F0;border-radius:5px;padding:2px 8px;">${t.redis_key}</span>`).join('')}
    </div>
  </div>`);

  // Tier cards
  const $grid = $('<div>').css({ display:'grid', gridTemplateColumns:'repeat(auto-fill,minmax(280px,1fr))', gap:'12px' });
  tiers.forEach((t, i) => $grid.append(buildTierCard(t, i, TOPS[i]||'')));
  $wrap.append($grid);

  // Usage card
  const $uc = buildUsageCard(selectedApiName, tiers);
  $wrap.append($uc);
  $uc.find('#preview-email,#preview-wallet').on('input', () => refreshUsage(selectedApiName));

  // Overrides card
  $wrap.append(buildOverridesCard(selectedApiName));
}

// ── TIER CARD ──
function buildTierCard(t, idx, topCls) {
  const isDaily = t.unit === 'daily';
  const PILL = ['pill-t1','pill-t2','pill-t3'];
  const scopePill = t.scope === 'email' ? 'pill-em' : 'pill-wl';

  const windowHtml = isDaily ? `
    <div><div class="flabel">Reset hour (0–23 BDT)</div>
      <input data-field="reset_hour" type="number" min="0" max="23" value="${t.reset_hour??0}" class="f-input"/></div>
    <div><div class="flabel">Window</div>
      <div style="position:relative;">
        <select data-field="window_daily" class="f-input" style="padding-right:28px;">
          <option selected>24h fixed daily</option>
        </select>
        <svg style="position:absolute;right:9px;top:50%;transform:translateY(-50%);width:11px;height:11px;color:#CBD5E1;pointer-events:none;"
             fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><polyline points="6,9 12,15 18,9"/></svg>
      </div></div>` : `
    <div><div class="flabel">Window</div>
      <input data-field="window" type="number" min="1" value="${t.window??10}" class="f-input"/></div>
    <div><div class="flabel">Unit</div>
      <div style="position:relative;">
        <select data-field="unit" class="f-input" style="padding-right:28px;">
          ${['seconds','minutes','hours'].map(u=>`<option${u===t.unit?' selected':''}>${u}</option>`).join('')}
        </select>
        <svg style="position:absolute;right:9px;top:50%;transform:translateY(-50%);width:11px;height:11px;color:#CBD5E1;pointer-events:none;"
             fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><polyline points="6,9 12,15 18,9"/></svg>
      </div></div>`;

  const $c = $(`<div class="card card-hover ${topCls}" style="padding:16px;display:flex;flex-direction:column;gap:13px;">
    <div style="display:flex;align-items:center;gap:6px;">
      <span class="pill ${PILL[idx]||'pill-t1'}">Tier ${t.tier}</span>
      <span class="pill ${scopePill}">${t.scope}</span>
    </div>
    <div class="mono" style="font-size:10px;color:#94A3B8;background:#F8FAFC;border:1px solid #F1F5F9;
         border-radius:6px;padding:6px 10px;word-break:break-all;line-height:1.7;">${t.redis_key}</div>
    ${windowHtml}
    <div><div class="flabel">Max requests</div>
      <input data-field="max_requests" type="number" min="1" value="${t.max_requests}" class="f-input"/></div>
  </div>`);

  const ref = () => tierCache[selectedApiName][idx];
  $c.find('[data-field="window"]').on('input', function() { ref().window = Math.max(1,parseInt($(this).val())||1); schedulePatch(selectedApiName, t.tier); });
  $c.find('[data-field="unit"]').on('change', function() { ref().unit = $(this).val(); schedulePatch(selectedApiName, t.tier); });
  $c.find('[data-field="reset_hour"]').on('input', function() { ref().reset_hour = Math.min(23,Math.max(0,parseInt($(this).val())||0)); schedulePatch(selectedApiName, t.tier); });
  $c.find('[data-field="max_requests"]').on('input', function() { ref().max_requests = Math.max(1,parseInt($(this).val())||1); schedulePatch(selectedApiName, t.tier); });
  return $c;
}

// ── USAGE CARD ──
function buildUsageCard(name, tiers) {
  const PILL = ['pill-t1','pill-t2','pill-t3'];
  const sp = s => s === 'email' ? 'pill-em' : 'pill-wl';
  const rows = tiers.map((t,i) => `
    <div data-usage-idx="${i}" style="padding:12px 0;${i<tiers.length-1?'border-bottom:1px solid #F1F5F9;':''}">
      <div style="display:flex;align-items:center;gap:6px;flex-wrap:wrap;margin-bottom:8px;">
        <span class="pill ${PILL[i]||'pill-t1'}">Tier ${t.tier}</span>
        <span class="pill ${sp(t.scope)}">${t.scope}</span>
        <span class="mono" style="margin-left:auto;font-size:9px;color:#CBD5E1;background:#F8FAFC;
          border:1px solid #F1F5F9;border-radius:4px;padding:2px 7px;max-width:260px;
          overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">${t.redis_key}</span>

      <div class="ubar-wrap" style="margin-bottom:5px;"><div class="ubar" id="ubar-${i}" style="width:0%;"></div></div>
      <p id="utxt-${i}" style="font-size:11px;color:#94A3B8;">${t.scope==='email'?'Enter email above to see usage':'Enter wallet above to see usage'}</p>
    </div>`).join('');

  return $(`<div class="card" style="padding:20px;">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;">
      <div style="display:flex;align-items:center;gap:8px;">
        <svg style="width:15px;height:15px;color:#6366F1;" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
          <polyline points="22,12 18,12 15,21 9,3 6,12 2,12"/>
        </svg>
        <span style="font-size:13px;font-weight:600;color:#0F172A;">Live Usage</span>
      </div>
      <span id="usage-updated" style="font-size:10px;color:#CBD5E1;display:none;"></span>
    </div>
    <div style="display:flex;flex-wrap:wrap;gap:10px;padding-bottom:14px;margin-bottom:4px;border-bottom:1px solid #F1F5F9;">
      <div style="display:flex;align-items:center;gap:8px;">
        <span class="pill pill-t1">T1 · email</span>
        <div style="position:relative;">
          <svg style="position:absolute;left:9px;top:50%;transform:translateY(-50%);width:12px;height:12px;color:#CBD5E1;pointer-events:none;"
               fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
            <circle cx="12" cy="8" r="4"/><path d="M4 20c0-4 3.6-7 8-7s8 3 8 7"/>
          </svg>
          <input id="preview-email" type="email" placeholder="Email address" class="f-input" style="padding-left:30px;width:200px;"/>
        </div>
      </div>
      <div style="display:flex;align-items:center;gap:8px;">
        <span class="pill pill-wl">T2/T3 · wallet</span>
        <div style="position:relative;">
          <svg style="position:absolute;left:9px;top:50%;transform:translateY(-50%);width:12px;height:12px;color:#CBD5E1;pointer-events:none;"
               fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
            <rect x="2" y="5" width="20" height="14" rx="2"/>
          </svg>
          <input id="preview-wallet" type="text" placeholder="Wallet address" class="f-input mono" style="padding-left:30px;width:200px;"/>
        </div>
      </div>
    </div>
    <div>${rows}</div>
  </div>`);
}

// ── USAGE REFRESH ──
async function refreshUsage(name) {
  if (!name || !tierCache[name]) return;
  const email = $('#preview-email').val().trim(), wallet = $('#preview-wallet').val().trim();
  if (!email && !wallet) {
    $('[data-usage-idx]').each(function(i) {
      $(`#ubar-${i}`).css('width','0%').attr('class','ubar');
      $(`#utxt-${i}`).text('Enter wallet/email above to see usage');
    });
    return;
  }
  try {
    const p = new URLSearchParams();
    if (email) p.set('email', email);
    if (wallet) p.set('wallet', wallet);
    const resp = await fetch(`${API_BASE}/apis/${encodeURIComponent(name)}/usage?${p}`);
    if (!resp.ok) return;
    const { data } = await resp.json();
    data.forEach((u, i) => {
      if (!u.scope_id) {
        $(`#ubar-${i}`).css('width','0%').attr('class','ubar');
        $(`#utxt-${i}`).text(u.scope==='email'?'Enter email above':'Enter wallet above');
        return;
      }
      const pct = u.limit > 0 ? Math.min(100, Math.round(u.used/u.limit*100)) : 0;
      const cls = pct>=100?'high':pct>=75?'mid':'low';
      $(`#ubar-${i}`).css('width',`${pct}%`).attr('class',`ubar ${cls}`);
      const rl = formatResetIn(u.reset_in);
      $(`#utxt-${i}`).html(
        `<span style="font-weight:600;color:#334155;">${u.used}</span>` +
        `<span style="color:#94A3B8;"> / ${u.limit} requests · ${rl||u.window}</span>` +
        (pct>=100?' <span style="color:#EF4444;font-weight:600;">LIMIT REACHED</span>':'')
      );
    });
    $('#usage-updated').css('display','inline').text(`Updated ${new Date().toLocaleTimeString()}`);
  } catch {}
}

// ── OVERRIDES CARD ──
function buildOverridesCard(apiName) {
  let overrides=[], nextToken=null, hasMore=false, loadingMore=false;

  const TIER_C = [
    { bg:'#EFF6FF', border:'#BFDBFE', color:'#1D4ED8', light:'#DBEAFE' },
    { bg:'#F5F3FF', border:'#DDD6FE', color:'#6D28D9', light:'#EDE9FE' },
    { bg:'#ECFDF5', border:'#A7F3D0', color:'#065F46', light:'#D1FAE5' },
  ];

  const $card = $(`<div class="card" style="padding:20px;">
    <div style="margin-bottom:18px;">
      <div style="display:flex;align-items:center;gap:8px;margin-bottom:10px;">
        <svg style="width:15px;height:15px;color:#8B5CF6;" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
          <path d="M17 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2"/>
          <circle cx="9" cy="7" r="4"/>
          <path d="M23 21v-2a4 4 0 00-3-3.87M16 3.13a4 4 0 010 7.75"/>
        </svg>
        <span style="font-size:13px;font-weight:600;color:#0F172A;">Per-wallet Overrides</span>
        <span style="font-size:10px;color:#94A3B8;">ScyllaDB · Redis cache 30 min</span>
      </div>
      <div style="display:flex;flex-wrap:wrap;gap:6px;">
        <span class="mono" style="font-size:10px;color:#64748B;background:#F8FAFC;border:1px solid #E2E8F0;
          border-radius:5px;padding:3px 10px;line-height:1.7;">
          ScyllaDB · api_name = <b style="color:#6366F1;">${apiName}</b>
          · wallet = <b style="color:#6366F1;" class="ov-kv-wallet">{wallet}</b>
          · t1 = <b style="color:#3B82F6;" class="ov-kv-t1">{t1}</b>
          · t2 = <b style="color:#3B82F6;" class="ov-kv-t2">{t2}</b>
          · t3 = <b style="color:#3B82F6;" class="ov-kv-t3">{t3}</b>
        </span>
        <span class="mono" style="font-size:10px;color:#64748B;background:#F8FAFC;border:1px solid #E2E8F0;
          border-radius:5px;padding:3px 10px;">
          Redis · rl:override:<b style="color:#6366F1;">${apiName}</b>:<b style="color:#6366F1;" class="ov-kv-wallet">{wallet}</b>
        </span>
      </div>
    </div>

    <!-- Lookup -->
    <div style="background:#FAFAFA;border:1px solid #E2E8F0;border-radius:10px;overflow:hidden;margin-bottom:16px;">
      <div style="background:#F8FAFC;padding:8px 14px;border-bottom:1px solid #E2E8F0;
                  display:flex;align-items:center;justify-content:space-between;gap:8px;">
        <span style="font-size:10px;font-weight:700;letter-spacing:.07em;text-transform:uppercase;color:#94A3B8;">Lookup wallet state</span>
        <div style="display:flex;align-items:center;gap:6px;flex:1;max-width:320px;justify-content:flex-end;">
          <div style="position:relative;flex:1;max-width:200px;">
            <svg style="position:absolute;left:9px;top:50%;transform:translateY(-50%);width:12px;height:12px;color:#CBD5E1;pointer-events:none;"
                 fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
              <circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/>
            </svg>
            <input id="lookup-wallet" type="text" placeholder="Wallet address" class="f-input mono" style="padding-left:30px;"/>
          </div>
          <button id="lookup-btn" class="btn-primary" style="padding:7px 12px;flex-shrink:0;">Search</button>
          <button id="lookup-clear" class="hidden btn-ghost" style="padding:7px;flex-shrink:0;">
            <svg style="width:13px;height:13px;" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M18 6L6 18M6 6l12 12"/></svg>
          </button>
        </div>
      </div>
      <div id="lookup-result" class="hidden" style="padding:14px;"></div>
    </div>

    <!-- Add override -->
    <div style="margin-bottom:16px;">
      <div style="font-size:10px;font-weight:700;letter-spacing:.07em;text-transform:uppercase;color:#94A3B8;margin-bottom:8px;">Add override</div>
      <div style="display:flex;flex-wrap:wrap;gap:8px;align-items:flex-end;">
        <div style="flex:2;min-width:130px;"><div class="flabel">Wallet</div><input id="ov-wallet" type="text" placeholder="01700000099" class="f-input mono"/></div>
        <div style="flex:1;min-width:80px;"><div class="flabel">T1 limit</div><input id="ov-t1" type="text" placeholder="global" class="f-input"/></div>
        <div style="flex:1;min-width:80px;"><div class="flabel">T2 limit</div><input id="ov-t2" type="text" placeholder="global" class="f-input"/></div>
        <div style="flex:1;min-width:80px;"><div class="flabel">T3 limit</div><input id="ov-t3" type="text" placeholder="global" class="f-input"/></div>
        <div style="flex:2;min-width:100px;"><div class="flabel">Reason</div><input id="ov-reason" type="text" placeholder="note…" class="f-input"/></div>
        <button id="ov-add" class="btn-primary" style="flex-shrink:0;align-self:flex-end;">
          <svg style="width:13px;height:13px;" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path d="M12 5v14M5 12h14"/></svg>Add
        </button>
      </div>
    </div>

    <!-- Table -->
    <div style="border:1px solid #E2E8F0;border-radius:9px;overflow:hidden;">
      <table style="width:100%;border-collapse:collapse;min-width:500px;">
        <thead>
          <tr style="background:#F8FAFC;">
            ${['Wallet','T1','T2','T3','Reason',''].map(h =>
              `<th style="text-align:left;padding:9px 12px;font-size:10px;font-weight:700;letter-spacing:.07em;
                          text-transform:uppercase;color:#CBD5E1;border-bottom:1px solid #E2E8F0;">${h}</th>`).join('')}
          </tr>
        </thead>
        <tbody id="ov-tbody"></tbody>
      </table>
    </div>
    <div id="ov-load-more" style="display:none;justify-content:center;margin-top:12px;">
      <button id="ov-load-more-btn" class="btn-ghost" style="font-size:11px;">Load more</button>
    </div>
  </div>`);

  function refreshTable() {
    const $tb = $card.find('#ov-tbody').empty();
    if (!overrides.length) {
      $(`<tr><td colspan="6" style="padding:32px;text-align:center;font-size:12px;color:#CBD5E1;">
        No wallet overrides for this API</td></tr>`).appendTo($tb);
    } else {
      overrides.forEach((r, i) => {
        const $del = $('<button>').css({ color:'#CBD5E1', background:'transparent', border:'none',
          cursor:'pointer', padding:'4px 6px', borderRadius:'5px', transition:'color .15s, background .15s' })
          .html('<svg width="13" height="13" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M3 6h18M8 6V4h8v2M19 6l-1 14H6L5 6"/></svg>')
          .on('mouseenter', function() { $(this).css({ color:'#EF4444', background:'#FFF1F2' }); })
          .on('mouseleave', function() { $(this).css({ color:'#CBD5E1', background:'transparent' }); })
          .on('click', async function() {
            const dw = overrides[i].wallet;
            try {
              await apiDeleteOverride(apiName, dw);
              overrides.splice(i, 1); invalidateWalletConfig(apiName, dw);
              refreshTable();
              if ($card.find('#lookup-wallet').val().trim() === dw) doLookup();
              showToast('Override removed', 'ok');
            } catch(e) { showToast(e.message, 'err'); }
          });
        const $tr = $('<tr>').addClass('ov-tr');
        $tr.append(
          $('<td>').addClass('ov-td mono').css({ color:'#0F172A', fontWeight:'500' }).text(r.wallet),
          $('<td>').addClass('ov-td').text(r.t1||'—'),
          $('<td>').addClass('ov-td').text(r.t2||'—'),
          $('<td>').addClass('ov-td').text(r.t3||'—'),
          $('<td>').addClass('ov-td').css({ color:'#94A3B8', maxWidth:'140px', overflow:'hidden', textOverflow:'ellipsis', whiteSpace:'nowrap' }).text(r.reason||'—'),
          $('<td>').addClass('ov-td').css({ textAlign:'right', padding:'6px 10px' }).append($del)
        );
        $tb.append($tr);
      });
    }
    hasMore ? $card.find('#ov-load-more').css('display','flex') : $card.find('#ov-load-more').hide();
  }

  async function loadMore() {
    if (loadingMore) return;
    loadingMore = true;
    const $btn = $card.find('#ov-load-more-btn').text('Loading…').prop('disabled', true);
    try {
      const pg = await fetchOverridePage(apiName, nextToken);
      overrides.push(...(pg.data||[]));
      nextToken = pg.next_page_token||null; hasMore = pg.has_more||false;
      refreshTable();
    } catch { showToast('Failed to load overrides', 'err'); }
    finally { loadingMore=false; $btn.text('Load more').prop('disabled',false); }
  }
  $card.find('#ov-load-more-btn').on('click', loadMore);

  async function doLookup() {
    const wn = $card.find('#lookup-wallet').val().trim();
    const $res = $card.find('#lookup-result');
    if (!wn) { $card.find('#lookup-wallet').focus(); return; }
    $res.removeClass('hidden').css('display','block').html(
      `<div style="display:flex;align-items:center;gap:8px;font-size:12px;color:#94A3B8;">
        <svg style="width:14px;height:14px;animation:spin 1s linear infinite;" fill="none" viewBox="0 0 24 24">
          <circle cx="12" cy="12" r="10" stroke="#E2E8F0" stroke-width="4"/>
          <path fill="#6366F1" d="M4 12a8 8 0 018-8v8z"/>
        </svg>Looking up…</div>`);
    $card.find('#lookup-clear').removeClass('hidden');

    let resolved;
    try { resolved = await fetchWalletConfig(apiName, wn); }
    catch { $res.html(`<p style="font-size:12px;color:#EF4444;">Failed to fetch wallet config</p>`); return; }

    $res.empty();
    const hasOv = resolved.tiers.some(rt => rt.overridden);
    const ov = overrides.find(r => r.wallet === wn);
    $card.find('.ov-kv-wallet').text(wn);
    $card.find('.ov-kv-t1').text(ov?(ov.t1||'global'):'{t1}');
    $card.find('.ov-kv-t2').text(ov?(ov.t2||'global'):'{t2}');
    $card.find('.ov-kv-t3').text(ov?(ov.t3||'global'):'{t3}');

    $res.append(`<div style="display:flex;align-items:center;gap:8px;margin-bottom:12px;">
      <span class="mono" style="font-size:13px;font-weight:600;color:#0F172A;">${wn}</span>
      <span style="font-size:10px;font-weight:600;padding:2px 9px;border-radius:20px;
        ${hasOv
          ? 'background:#EDE9FE;color:#6D28D9;border:1px solid #DDD6FE;'
          : 'background:#F1F5F9;color:#94A3B8;border:1px solid #E2E8F0;'}">
        ${hasOv?'has override':'global defaults'}</span>
    </div>`);

    const $grid = $('<div>').css({ display:'grid', gridTemplateColumns:'repeat(auto-fill,minmax(180px,1fr))', gap:'8px' });
    resolved.tiers.forEach((rt, i) => {
      const c = TIER_C[i]||TIER_C[0];
      const isD = rt.unit==='daily';
      const gLbl = isD?`${rt.global_max}/day`:`${rt.global_max}/${rt.window??'?'} ${rt.unit}`;
      const eLbl = isD?`${rt.effective_max}/day`:`${rt.effective_max}/${rt.window??'?'} ${rt.unit}`;
      $grid.append(`<div style="background:${c.bg};border:1px solid ${c.border};border-radius:9px;padding:12px;">
        <div style="display:flex;align-items:center;gap:6px;margin-bottom:8px;">
          <span style="font-size:11px;font-weight:700;color:${c.color};">Tier ${rt.tier}</span>
          <span style="font-size:10px;color:${c.color};opacity:.6;">${rt.scope}</span>
        </div>
        <p style="font-size:10px;color:#94A3B8;margin-bottom:3px;">Effective limit</p>
        <p class="mono" style="font-size:12px;font-weight:700;color:#0F172A;">${eLbl}</p>
        ${rt.overridden?`<p class="mono" style="font-size:10px;color:#CBD5E1;text-decoration:line-through;margin-top:5px;">${gLbl}</p>`:''}
        <div style="margin-top:8px;padding-top:6px;border-top:1px solid ${c.border};">
          <span style="font-size:10px;${rt.overridden?`color:${c.color};font-weight:600;`:'color:#CBD5E1;'}">
            ${rt.overridden?'↑ overridden':'global default'}</span>
        </div>
      </div>`);
    });
    $res.append($grid);
  }

  $card.find('#lookup-btn').on('click', doLookup);
  $card.find('#lookup-wallet').on('keydown', e => { if (e.key==='Enter') doLookup(); });
  $card.find('#lookup-clear').on('click', function() {
    $card.find('#lookup-wallet').val('');
    $card.find('#lookup-result').addClass('hidden').css('display','none').empty();
    $(this).addClass('hidden');
    $card.find('.ov-kv-wallet').text('{wallet}');
    $card.find('.ov-kv-t1,.ov-kv-t2,.ov-kv-t3').each(function(i) { $(this).text(`{t${i+1}}`); });
  });

  $card.find('#ov-add').on('click', async function() {
    const wallet = $card.find('#ov-wallet').val().trim();
    if (!wallet) {
      $card.find('#ov-wallet').css({ 'border-color':'#FCA5A5', 'box-shadow':'0 0 0 3px rgba(239,68,68,.1)' });
      setTimeout(() => $card.find('#ov-wallet').css({ 'border-color':'', 'box-shadow':'' }), 1500);
      return;
    }
    const o = {
      wallet,
      t1: $card.find('#ov-t1').val().trim()||'global',
      t2: $card.find('#ov-t2').val().trim()||'global',
      t3: $card.find('#ov-t3').val().trim()||'global',
      reason: $card.find('#ov-reason').val().trim()||'',
    };
    try {
      await apiAddOverride(apiName, o);
      invalidateWalletConfig(apiName, wallet);
      const idx = overrides.findIndex(r => r.wallet===wallet);
      if (idx>=0) overrides[idx]=o; else overrides.unshift(o);
      $card.find('#ov-wallet,#ov-t1,#ov-t2,#ov-t3,#ov-reason').val('');
      refreshTable();
      if ($card.find('#lookup-wallet').val().trim()===wallet) doLookup();
      showToast('Override added', 'ok');
    } catch(e) { showToast(e.message, 'err'); }
  });

  loadMore();
  return $card;
}

// ── PANEL ──
function openApiPanel()  { $('#api-panel').css('transform','translateX(0)'); $('#api-overlay').removeClass('hidden'); }
function closeApiPanel() { $('#api-panel').css('transform',''); $('#api-overlay').addClass('hidden'); }

// ── INIT ──
$(async function() {
  try { await fetchAPIList(); } catch { showToast('Could not connect to server', 'err'); }
  renderSidebar();
  await renderMain();
  setInterval(() => refreshUsage(selectedApiName), 4000);
  $('#api-search').on('input', function() { renderSidebar($(this).val()); });
  $('#save-btn').on('click', () => showToast('Changes are saved automatically', 'ok'));
  $('#api-panel-toggle').on('click', function() {
    const t = $('#api-panel').css('transform');
    (!t||t==='none'||t.includes('-')) ? openApiPanel() : closeApiPanel();
  });
  $('#api-overlay').on('click', closeApiPanel);
  $(window).on('resize', () => { if (window.innerWidth>=768) closeApiPanel(); });
});
